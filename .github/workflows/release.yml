name: Release

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: write

jobs:
  python-dist:
    name: Build Python package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build package
        run: python -m build

      - name: Upload Python package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: |
            dist/*.whl
            dist/*.tar.gz

  windows-exe:
    name: Build Windows executable
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project and build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"

      - name: Build executable
        run: python scripts/build_gui.py

      - name: Package executable
        shell: pwsh
        run: Compress-Archive -Path dist/BambuddyPlateClearButton.exe -DestinationPath dist/BambuddyPlateClearButton-windows.zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/BambuddyPlateClearButton-windows.zip

  macos-app:
    name: Build macOS app
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project and build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"

      - name: Build app
        run: python scripts/build_gui.py

      - name: Package app bundle
        run: ditto -c -k --keepParent dist/BambuddyPlateClearButton.app dist/BambuddyPlateClearButton-macos.zip

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: dist/BambuddyPlateClearButton-macos.zip

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - python-dist
      - windows-exe
      - macos-app

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
